name: Deploy to Azure App Service

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore finalProject.slnx

      - name: Build
        run: dotnet build finalProject.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test BLL.Tests/BLL.Tests.csproj --configuration Release --no-build

      - name: Publish
        run: dotnet publish finalProject/finalProject.csproj --configuration Release --no-build --output publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: finala
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish
